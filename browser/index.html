<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Browser Size</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Display browser viewport width, height, and device pixel ratio in real time."
    />
    <link rel="canonical" href="https://vicchow.github.io/browser/" />
    <meta property="og:title" content="Browser Size" />
    <meta
      property="og:description"
      content="Display browser viewport width, height, and device pixel ratio in real time."
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicons/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      function updateOutput() {
        const heightOutput = document.querySelector("#height");
        const widthOutput = document.querySelector("#width");
        const devicePxRatio = document.querySelector("#devicePxRatio");

        heightOutput.textContent = window.innerHeight;
        widthOutput.textContent = window.innerWidth;
        devicePxRatio.textContent = window.devicePixelRatio;
      }

      window.addEventListener("resize", (event) => {
        updateOutput();
      });
      window.addEventListener("DOMContentLoaded", (event) => {
        updateOutput();
      });
    </script>
  </head>

  <body>
    <main>
      <article>
        <h1>Browser Size</h1>
        <p>Browser content size (w x h): <span id="width"></span> px x <span id="height"></span> px.</p>
        <p>Browser device pixel ratio: <span id="devicePxRatio"></span></p>
      </article>
    </main>
  </body>
</html>
