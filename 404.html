<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found</title>
    <meta name="description" content="The requested page could not be found." />
    <link rel="canonical" href="https://vicchow.github.io/404.html" />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicons/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <form class="theme-switcher" action="#" aria-label="Theme selector">
      <fieldset>
        <legend>Theme</legend>
        <label><input type="radio" name="theme" id="theme-system" checked /><span>System</span></label>
        <label><input type="radio" name="theme" id="theme-light" /><span>Light</span></label>
        <label><input type="radio" name="theme" id="theme-dark" /><span>Dark</span></label>
      </fieldset>
    </form>
    <main>
      <article>
        <h1>404 - Page not found</h1>
        <p>The page you requested does not exist or may have moved.</p>
        <p><a href="/">Return to the homepage</a></p>
      </article>
    </main>
  </body>
</html>
